<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – DigitalMarket</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0f0f13;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
    .wrap{max-width:480px}
    .code{font-size:120px;font-weight:800;background:linear-gradient(135deg,#6366f1,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
    h1{font-size:24px;font-weight:700;margin:16px 0 10px}
    p{color:#8892a4;font-size:15px;margin-bottom:32px}
    a{display:inline-block;padding:12px 28px;background:#6366f1;color:#fff;border-radius:8px;font-size:15px;font-weight:600;text-decoration:none;transition:background .2s}
    a:hover{background:#4f46e5}
  </style>
  <script>
    // Redirect to home after 5 seconds
    setTimeout(function(){ window.location.href = '/'; }, 5000);
  </script>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. You'll be redirected to the homepage in 5 seconds.</p>
    <a href="/">Go to Homepage</a>
  </div>
</body>
</html>
