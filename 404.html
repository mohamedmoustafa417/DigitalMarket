<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – DigitalMarket</title>
  <meta name="description" content="The page you're looking for doesn't exist. Browse our digital marketplace for ebooks, courses, templates, and more.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="canonical" href="https://digitalmarketstore.shop/404.html">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f13;color:#e2e8f0;min-height:100vh;padding:40px 20px}
    .wrap{max-width:680px;margin:0 auto;text-align:center}
    .code{font-size:140px;font-weight:800;background:linear-gradient(135deg,#6366f1,#10b981,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;letter-spacing:-0.05em}
    h1{font-size:28px;font-weight:700;margin:8px 0 12px}
    .lead{color:#8892a4;font-size:16px;margin-bottom:24px;line-height:1.55}
    .search-box{display:flex;gap:8px;max-width:420px;margin:0 auto 32px}
    .search-box input{flex:1;padding:12px 16px;background:#1a1a23;border:1px solid #2a2a35;color:#fff;border-radius:8px;font-size:15px}
    .search-box input:focus{outline:none;border-color:#6366f1}
    .cta{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:#6366f1;color:#fff;border-radius:8px;font-size:15px;font-weight:600;text-decoration:none;transition:transform .2s,background .2s;border:none;cursor:pointer}
    .cta:hover{background:#4f46e5;transform:translateY(-1px)}
    .cta.secondary{background:transparent;border:1px solid #2a2a35;margin-left:8px}
    .cta.secondary:hover{background:#1a1a23}
    h2{font-size:18px;font-weight:600;margin:48px 0 16px;color:#fff}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:16px}
    .card{background:#1a1a23;border:1px solid #2a2a35;border-radius:10px;padding:16px;text-decoration:none;color:inherit;transition:transform .2s,border-color .2s;display:block}
    .card:hover{transform:translateY(-2px);border-color:#6366f1}
    .card .emoji{font-size:28px;margin-bottom:6px}
    .card .name{font-size:13px;font-weight:600;color:#fff}
    .card .price{font-size:12px;color:#6366f1;margin-top:4px}
    .links{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:32px;font-size:14px}
    .links a{color:#8892a4;text-decoration:none}
    .links a:hover{color:#6366f1}
    @media(max-width:520px){.code{font-size:100px}h1{font-size:22px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This page wandered off</h1>
    <p class="lead">The URL might be mistyped, or the product may have been removed.<br>Try searching, or check out some of our most popular items below.</p>

    <form class="search-box" onsubmit="event.preventDefault();const q=this.querySelector('input').value.trim();if(q)location.href='/?q='+encodeURIComponent(q);">
      <input type="search" placeholder="Search products…" autofocus>
      <button class="cta" type="submit">Search</button>
    </form>

    <a href="/" class="cta">🏠 Go Home</a>
    <a href="/?view=cart" class="cta secondary">🛒 View Cart</a>

    <h2>🔥 Popular right now</h2>
    <div class="grid" id="popular-grid">
      <div style="padding:20px;color:#8892a4;font-size:13px;grid-column:1/-1;">Loading…</div>
    </div>

    <div class="links">
      <a href="/">Home</a>
      <a href="/terms.html">Terms</a>
      <a href="/privacy.html">Privacy</a>
      <a href="mailto:support@digitalmarketstore.shop">Contact</a>
    </div>
  </div>

  <!-- Firebase compat (same as main app) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    try {
      firebase.initializeApp({
        apiKey: "AIzaSyBHpkVI1WjV3JmDQjzCu8MJyzu5cgnYV-c",
        authDomain: "digitalmarket-38db5.firebaseapp.com",
        projectId: "digitalmarket-38db5",
        storageBucket: "digitalmarket-38db5.firebasestorage.app",
        messagingSenderId: "1056432849538",
        appId: "1:1056432849538:web:af30dad42b0f5c1f7c8a3d"
      });
      const db = firebase.firestore();
      db.collection('products').where('status','==','approved').orderBy('purchaseCount','desc').limit(6).get()
        .then(snap => {
          const grid = document.getElementById('popular-grid');
          if (!snap.docs.length) { grid.innerHTML = '<div style="color:#8892a4;padding:20px;grid-column:1/-1;">No products yet — be the first!</div>'; return; }
          grid.innerHTML = snap.docs.map(d => {
            const p = d.data();
            const name = (p.name || '').replace(/[<>"']/g, '');
            return `<a href="/?p=${d.id}" class="card">
              <div class="emoji">${p.emoji || '📦'}</div>
              <div class="name">${name.slice(0,40)}</div>
              <div class="price">EGP ${Number(p.price||0).toLocaleString()}</div>
            </a>`;
          }).join('');
        })
        .catch(() => {
          document.getElementById('popular-grid').innerHTML = '<div style="color:#8892a4;padding:20px;grid-column:1/-1;">Browse all products on the homepage.</div>';
        });
    } catch (e) { console.warn('Firebase init failed', e); }
  </script>
</body>
</html>
