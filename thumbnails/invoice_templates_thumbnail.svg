<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Stacked invoice cards -->
  <g transform="translate(290, 130)">
    <rect x="20" y="20" width="220" height="280" rx="8" fill="#0ea5e9" opacity="0.4" filter="drop-shadow(0 8px 16px rgba(0,0,0,0.3))"/>
    <rect x="10" y="10" width="220" height="280" rx="8" fill="#0ea5e9" opacity="0.6"/>
    <rect x="0"  y="0"  width="220" height="280" rx="8" fill="#fff" filter="drop-shadow(0 10px 20px rgba(0,0,0,0.4))"/>
    <!-- Invoice header -->
    <rect x="0" y="0" width="220" height="50" rx="8" fill="#0ea5e9"/>
    <rect x="0" y="38" width="220" height="14" fill="#0ea5e9"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#fff">INVOICE</text>
    <text x="200" y="32" font-family="Inter, sans-serif" font-size="11" fill="#bae6fd" text-anchor="end">#001</text>
    <!-- Body lines -->
    <rect x="15" y="70"  width="100" height="6" rx="3" fill="#0369a1"/>
    <rect x="15" y="84"  width="140" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="15" y="110" width="190" height="1" fill="#e2e8f0"/>
    <rect x="15" y="120" width="80" height="5" rx="2.5" fill="#94a3b8"/>
    <rect x="160" y="120" width="40" height="5" rx="2.5" fill="#94a3b8"/>
    <rect x="15" y="135" width="120" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="170" y="135" width="30" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="15" y="148" width="100" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="170" y="148" width="30" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="15" y="161" width="130" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="170" y="161" width="30" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="15" y="180" width="190" height="1" fill="#e2e8f0"/>
    <!-- Total -->
    <rect x="100" y="195" width="60" height="6" rx="3" fill="#0369a1"/>
    <rect x="165" y="193" width="42" height="10" rx="3" fill="#0ea5e9"/>
    <!-- Pay button -->
    <rect x="60" y="230" width="100" height="32" rx="6" fill="#10b981"/>
    <text x="110" y="251" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">PAID ✓</text>
  </g>
  <text x="400" y="480" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">Invoice Templates</text>
  <text x="400" y="515" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#7dd3fc" text-anchor="middle" letter-spacing="2">PRO · FREELANCER · PACK</text>
</svg>
