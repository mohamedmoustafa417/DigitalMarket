<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  <rect width="800" height="8" fill="#6366f1"/>
  <g id="content">
    <rect x="50" y="50" width="150" height="40" rx="20" fill="#6366f1" opacity="0.9"/>
    <text x="125" y="75" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">COURSES</text>
    <g filter="url(#shadow)" transform="translate(400, 200)">
      <rect x="-70" y="-90" width="140" height="180" fill="#f5f5f5" stroke="#999" stroke-width="1.5" rx="2"/>
      <g transform="rotate(-8)">
        <rect x="-70" y="-90" width="140" height="180" fill="#ffffff" stroke="#999" stroke-width="1.5" rx="2"/>
        <line x1="-60" y1="-70" x2="60" y2="-70" stroke="#e0e0e0" stroke-width="1"/>
        <line x1="-60" y1="-50" x2="60" y2="-50" stroke="#e0e0e0" stroke-width="1"/>
        <line x1="-60" y1="-30" x2="60" y2="-30" stroke="#e0e0e0" stroke-width="1"/>
      </g>
      <g transform="rotate(-16)">
        <rect x="-70" y="-90" width="140" height="180" fill="#ffffff" stroke="#6366f1" stroke-width="2" rx="2"/>
        <line x1="-55" y1="-75" x2="55" y2="-75" stroke="#6366f1" stroke-width="2"/>
        <line x1="-55" y1="-55" x2="55" y2="-55" stroke="#ddd" stroke-width="1"/>
        <line x1="-55" y1="-40" x2="55" y2="-40" stroke="#ddd" stroke-width="1"/>
        <line x1="-55" y1="-25" x2="55" y2="-25" stroke="#ddd" stroke-width="1"/>
        <line x1="-55" y1="-10" x2="55" y2="-10" stroke="#ddd" stroke-width="1"/>
      </g>
    </g>
    <text x="400" y="430" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">30-Day Freelancing</text>
    <text x="400" y="468" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Roadmap</text>
    <text x="400" y="505" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#6366f1" text-anchor="middle">&#x62E;&#x637;&#x629; &#x627;&#x644;&#x641;&#x631;&#x64A;&#x644;&#x627;&#x646;&#x633;&#x64A;&#x646;&#x62C; &#x641;&#x64A; 30 &#x64A;&#x648;&#x645;</text>
    <g transform="translate(50, 520)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">8 Chapters</text>
      <text x="180" y="0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">Arabic and English</text>
      <text x="420" y="0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">Action Steps</text>
      <text x="650" y="0" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="end">299 EGP</text>
    </g>
  </g>
</svg>
