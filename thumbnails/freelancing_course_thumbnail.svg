<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Graduation cap -->
  <g transform="translate(280, 130)" filter="drop-shadow(0 10px 20px rgba(0,0,0,0.5))">
    <path d="M120 0 L240 60 L120 120 L0 60 Z" fill="#fff"/>
    <path d="M30 75 L30 140 Q30 170 120 170 Q210 170 210 140 L210 75 L120 120 Z" fill="#f97316"/>
    <line x1="240" y1="60" x2="240" y2="160" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="240" cy="170" r="10" fill="#fbbf24"/>
  </g>
  <!-- Play button overlay -->
  <g transform="translate(560, 360)">
    <circle cx="0" cy="0" r="36" fill="url(#play)" filter="drop-shadow(0 6px 12px rgba(0,0,0,0.4))"/>
    <polygon points="-10,-14 -10,14 16,0" fill="#fff"/>
  </g>
  <text x="400" y="480" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">Freelancing Roadmap</text>
  <text x="400" y="515" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#fdba74" text-anchor="middle" letter-spacing="2">30 · DAY · COURSE</text>
</svg>
