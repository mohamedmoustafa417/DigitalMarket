<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Thumbnail card -->
  <g transform="translate(220, 130)" filter="drop-shadow(0 14px 28px rgba(0,0,0,0.5))">
    <rect width="360" height="220" rx="12" fill="#1f2937"/>
    <!-- Image area gradient -->
    <rect width="360" height="160" rx="12" fill="#dc2626"/>
    <rect y="148" width="360" height="12" fill="#dc2626"/>
    <!-- Sparkles for visual interest -->
    <circle cx="60" cy="40" r="3" fill="#fde047"/>
    <circle cx="320" cy="60" r="4" fill="#fde047"/>
    <circle cx="280" cy="30" r="2" fill="#fde047"/>
    <circle cx="80" cy="100" r="3" fill="#fde047"/>
    <!-- Big play button -->
    <circle cx="180" cy="80" r="38" fill="#fff" opacity="0.95"/>
    <polygon points="170,62 170,98 200,80" fill="#dc2626"/>
    <!-- Duration badge -->
    <rect x="295" y="125" width="50" height="18" rx="3" fill="rgba(0,0,0,0.8)"/>
    <text x="320" y="138" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">12:34</text>
    <!-- Bottom title area -->
    <rect x="14" y="175" width="280" height="8" rx="3" fill="#9ca3af"/>
    <rect x="14" y="190" width="180" height="6" rx="2" fill="#6b7280"/>
  </g>
  <text x="400" y="425" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">YouTube Thumbnails</text>
  <text x="400" y="460" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#fca5a5" text-anchor="middle" letter-spacing="2">CLICK · WORTHY · DESIGNS</text>
  <!-- YouTube logo nod -->
  <g transform="translate(380, 490)">
    <rect width="40" height="28" rx="6" fill="#dc2626"/>
    <polygon points="15,8 15,20 25,14" fill="#fff"/>
  </g>
</svg>
