<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#581c87"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Book -->
  <g transform="translate(310, 120)" filter="drop-shadow(0 14px 28px rgba(0,0,0,0.5))">
    <!-- Pages behind cover -->
    <rect x="6" y="6" width="170" height="240" rx="4" fill="#fef3c7"/>
    <rect x="3" y="3" width="170" height="240" rx="4" fill="#fde68a"/>
    <!-- Front cover -->
    <rect width="170" height="240" rx="4" fill="url(#cover)"/>
    <!-- Lightbulb icon -->
    <g transform="translate(85, 90)">
      <circle r="32" fill="#fbbf24" opacity="0.95"/>
      <path d="M-12 -10 Q-12 -22 0 -22 Q12 -22 12 -10 Q12 -2 6 4 L6 14 L-6 14 L-6 4 Q-12 -2 -12 -10 Z" fill="#fff"/>
      <rect x="-4" y="14" width="8" height="6" fill="#fef3c7"/>
    </g>
    <!-- Title text -->
    <text x="85" y="170" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">PRODUCTIVITY</text>
    <text x="85" y="190" font-family="Inter, sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle" letter-spacing="2">PLAYBOOK</text>
    <line x1="40" y1="205" x2="130" y2="205" stroke="#ddd6fe" stroke-width="1"/>
    <text x="85" y="222" font-family="Inter, sans-serif" font-size="8" fill="#ddd6fe" text-anchor="middle">100+ STRATEGIES</text>
  </g>
  <text x="400" y="475" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">Productivity eBook</text>
  <text x="400" y="510" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#c4b5fd" text-anchor="middle" letter-spacing="2">PROVEN · STRATEGIES</text>
</svg>
