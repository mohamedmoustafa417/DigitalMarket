<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGradient2)"/>
  <rect width="800" height="8" fill="#06b6d4"/>
  <g id="content">
    <rect x="50" y="50" width="150" height="40" rx="20" fill="#06b6d4" opacity="0.9"/>
    <text x="125" y="75" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">E-BOOKS</text>
    <g filter="url(#shadow2)" transform="translate(400, 200)">
      <rect x="30" y="-100" width="12" height="200" fill="#055f75" rx="2"/>
      <rect x="-80" y="-100" width="160" height="200" fill="url(#bookGradient)" rx="4" stroke="#ffffff" stroke-width="1.5"/>
      <circle cx="-30" cy="-60" r="8" fill="#ffffff" opacity="0.6"/>
      <circle cx="30" cy="-50" r="6" fill="#ffffff" opacity="0.4"/>
      <line x1="-70" y1="-30" x2="70" y2="-30" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
      <text x="0" y="-10" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">DIGITAL</text>
      <text x="0" y="10" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">PRODUCTIVITY</text>
    </g>
    <text x="400" y="430" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">The Digital Productivity</text>
    <text x="400" y="468" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Playbook</text>
    <text x="400" y="505" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#06b6d4" text-anchor="middle">&#x62F;&#x644;&#x64A;&#x644; &#x627;&#x644;&#x625;&#x646;&#x62A;&#x627;&#x62C;&#x64A;&#x629; &#x627;&#x644;&#x631;&#x642;&#x645;&#x64A;&#x629;</text>
    <g transform="translate(50, 520)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#06b6d4">12 Pages</text>
      <text x="160" y="0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#06b6d4">7 Chapters</text>
      <text x="340" y="0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#06b6d4">Proven Techniques</text>
      <text x="620" y="0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#06b6d4">30-Day Challenge</text>
      <text x="750" y="30" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="end">79 EGP</text>
    </g>
  </g>
</svg>
