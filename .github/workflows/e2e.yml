name: E2E smoke tests

# Runs the Playwright smoke suite against the built site on every push/PR.
# Guards the critical paths: load, product render, buy funnel, search, RTL,
# mobile layout. A red X here means a user-facing regression shipped.

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tests
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'   # provides `python` for the static file server

      - name: Install test deps
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run smoke tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
