name: Auto-Regenerate Sitemap

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate sitemap.xml from public Firestore
        run: |
          # Read approved products via the public Firestore REST API.
          # /publicProfiles and /products both allow public reads, so no auth needed.
          # (Previously we called the generateSitemap Cloud Function which has CORS
          #  locked to digitalmarketstore.shop — GitHub Actions could not call it.)

          BASE="https://digitalmarketstore.shop"
          PROJECT="digitalmarket-38db5"
          API="https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents"

          # Static pages
          DATE=$(date -u +%Y-%m-%d)
          cat > sitemap.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url><loc>${BASE}/</loc><lastmod>${DATE}</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>
            <url><loc>${BASE}/help.html</loc><lastmod>${DATE}</lastmod><changefreq>monthly</changefreq><priority>0.6</priority></url>
            <url><loc>${BASE}/terms.html</loc><changefreq>monthly</changefreq><priority>0.3</priority></url>
            <url><loc>${BASE}/privacy.html</loc><changefreq>monthly</changefreq><priority>0.3</priority></url>
          EOF

          # Blog articles (static, committed under blog/)
          for f in blog/*.html; do
            [ -e "$f" ] || continue
            echo "  <url><loc>${BASE}/${f}</loc><lastmod>${DATE}</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>" >> sitemap.xml
          done

          # Fetch up to 1000 approved products via runQuery (paginates via pageToken if needed)
          QUERY='{"structuredQuery":{"from":[{"collectionId":"products"}],"where":{"fieldFilter":{"field":{"fieldPath":"status"},"op":"EQUAL","value":{"stringValue":"approved"}}},"limit":1000}}'

          RESPONSE=$(curl -sf -X POST "${API}:runQuery" \
            -H "Content-Type: application/json" \
            -d "$QUERY" || echo '[]')

          # Extract document IDs (last segment of doc name)
          echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              for row in data:
                  doc = row.get('document', {})
                  name = doc.get('name', '')
                  if not name:
                      continue
                  doc_id = name.rsplit('/', 1)[-1]
                  fields = doc.get('fields', {})
                  ts = fields.get('updatedAt', {}).get('timestampValue', '')[:10] or fields.get('createdAt', {}).get('timestampValue', '')[:10]
                  lastmod = f'<lastmod>{ts}</lastmod>' if ts else ''
                  # /p/<id>.html = static share page with per-product OG meta +
                  # Product schema (crawlable); it redirects users into the SPA.
                  print(f'  <url><loc>https://digitalmarketstore.shop/p/{doc_id}.html</loc>{lastmod}<changefreq>weekly</changefreq><priority>0.8</priority></url>')
          except Exception as e:
              print(f'<!-- failed to parse Firestore response: {e} -->', file=sys.stderr)
          " >> sitemap.xml

          echo "</urlset>" >> sitemap.xml

          # Sanity check
          if ! grep -q '<urlset' sitemap.xml; then
            echo "::error::sitemap.xml malformed — aborting"
            cat sitemap.xml | head -20
            exit 1
          fi

          URL_COUNT=$(grep -c '<loc>' sitemap.xml || echo 0)
          echo "Generated sitemap.xml with $URL_COUNT URLs"

      - name: Commit if changed
        run: |
          if git diff --quiet sitemap.xml; then
            echo "No changes — skipping commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sitemap.xml
            git commit -m "chore: auto-regenerate sitemap.xml"
            git push
          fi
