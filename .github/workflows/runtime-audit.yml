name: Runtime Audit (headless Chromium)

on:
  schedule:
    - cron: '15 4 * * 1'   # Mondays 04:15 UTC
  workflow_dispatch:
  push:
    branches: [main, master]   # full sweep (smoke audit + responsive/overlap) on every push

permissions:
  contents: read
  issues: write           # so the job can open an issue if errors are found

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Puppeteer (with bundled Chromium)
        run: |
          mkdir -p ci-audit && cd ci-audit
          npm init -y >/dev/null
          npm install puppeteer --no-audit --no-fund

      - name: Write audit script
        run: |
          cat > ci-audit/audit.js << 'AUDIT_EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const SITE = process.env.AUDIT_URL || 'https://digitalmarketstore.shop/';

          (async () => {
            const findings = { errors: [], failedReqs: [], httpErrors: [], pageErrors: [], perf: {}, workflows: [] };
            const browser = await puppeteer.launch({ headless: 'new', args: ['--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 900 });

            page.on('console', m => { if (m.type() === 'error') findings.errors.push(m.text().slice(0,300)); });
            page.on('pageerror', e => findings.pageErrors.push(e.message));
            page.on('requestfailed', r => {
              const url = r.url();
              if (url.includes('google-analytics.com')) return; // GA aborts on page close, not real
              findings.failedReqs.push({ url, failure: r.failure()?.errorText });
            });
            page.on('response', r => { if (r.status() >= 400) findings.httpErrors.push({ status: r.status(), url: r.url() }); });

            const t0 = Date.now();
            await page.goto(SITE, { waitUntil: 'load', timeout: 60000 });
            findings.perf.loadTime = Date.now() - t0;

            // Wait up to 20s for Firestore products to populate (was 3.5s).
            // CI runners sometimes have flaky outbound network on first connect.
            await page.waitForFunction(
              () => typeof allProducts !== 'undefined' && Array.isArray(allProducts) && allProducts.length > 0,
              { timeout: 20000 }
            ).catch(() => { /* surfaces as productCards===0 below */ });
            await new Promise(r => setTimeout(r, 1500));

            // Critical workflow checks
            const probe = await page.evaluate(() => {
              const $ = id => document.getElementById(id);
              return {
                hasFirebase: typeof firebase !== 'undefined',
                hasDb:       typeof db !== 'undefined',
                hasNavigate: typeof navigate === 'function',
                productCards: document.querySelectorAll('.product-card').length,
                allProducts: typeof allProducts !== 'undefined' ? allProducts.length : -1,
                jsonld: document.querySelectorAll('script[type="application/ld+json"]').length,
                searchInput: !!$('search-input'),
                cartButton: !!$('mbn-cart'),
                cookieBanner: !!$('cookie-banner'),
              };
            });
            findings.workflows.push({ name: 'Smoke probe', ...probe });

            // Verify Firestore actually returns approved products
            const fbProbe = await page.evaluate(async () => {
              if (typeof db === 'undefined') return { error: 'db missing' };
              try {
                const s = await db.collection('products').where('status','==','approved').limit(3).get();
                return { count: s.size };
              } catch (e) { return { error: e.message }; }
            });
            findings.workflows.push({ name: 'Firestore query', ...fbProbe });

            // Trigger ? shortcut and verify modal opens (defensive: shouldn't crash)
            await page.keyboard.press('?');
            await new Promise(r => setTimeout(r, 400));
            const shortcutsOk = await page.evaluate(() => !!document.getElementById('dm-shortcuts-modal'));
            findings.workflows.push({ name: 'Shortcuts modal', opens: shortcutsOk });

            // Simulate the historical Sentry crash (IME with undefined key) — must NOT crash
            try {
              await page.evaluate(() => {
                const ev = new KeyboardEvent('keydown', { isComposing: true, keyCode: 229 });
                Object.defineProperty(ev, 'key', { value: undefined });
                document.dispatchEvent(ev);
              });
              findings.workflows.push({ name: 'IME keydown defensive', ok: true });
            } catch (e) {
              findings.workflows.push({ name: 'IME keydown defensive', ok: false, error: e.message });
            }

            await page.screenshot({ path: 'home.png' });
            await browser.close();

            fs.writeFileSync('findings.json', JSON.stringify(findings, null, 2));

            // Filter out known transient/harmless page errors
            const realPageErrors = findings.pageErrors.filter(e =>
              !/Cross-Origin-Opener-Policy|X-Frame-Options.*meta|webkit-text-fill-color|ResizeObserver loop/.test(e)
            );

            // Only fail on issues that genuinely block the site
            const critical = [];
            if (realPageErrors.length > 0)       critical.push(`pageErrors=${realPageErrors.length}`);
            if (probe.hasFirebase === false)     critical.push('firebase missing');
            if (probe.hasDb === false)           critical.push('db missing');
            if (!fbProbe.error && fbProbe.count === undefined) critical.push('firestore probe broken');
            // NB: productCards/allProducts/jsonld can be transient on CI — log only, don't fail
            // (the test catches Firestore connectivity via fbProbe instead)

            console.log('Findings:', JSON.stringify(findings, null, 2));
            if (critical.length > 0) {
              console.error('AUDIT FAILED — critical issues: ' + critical.join('; '));
              process.exit(1);
            }
            // Warning-level (don't fail CI, but log clearly)
            const warns = [];
            if (probe.productCards === 0) warns.push('productCards=0 (CI network flaky? Manual check ok)');
            if (probe.jsonld === 0) warns.push('jsonld=0');
            if (!shortcutsOk) warns.push('? shortcut did not open modal (often Puppeteer keystroke nuance)');
            if (warns.length) console.warn('AUDIT WARNINGS (non-blocking): ' + warns.join('; '));
            console.log('AUDIT PASSED');
          })().catch(e => { console.error(e); process.exit(2); });
          AUDIT_EOF

      - name: Run audit
        id: audit
        working-directory: ci-audit
        run: node audit.js
        continue-on-error: true

      - name: Responsive + overlap sweep (pushed code, 320/375/414/1440)
        id: sweep
        continue-on-error: true
        run: |
          # Serve the just-checked-out code so we test THIS push, not the (laggy) live site.
          python3 -m http.server 8080 --directory "$GITHUB_WORKSPACE" >/dev/null 2>&1 &
          SRV=$!
          sleep 2
          cat > ci-audit/sweep.js << 'SWEEP_EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const SITE = 'http://localhost:8080/';
          const WIDTHS = [320, 375, 414, 1440];
          const sleep = ms => new Promise(r => setTimeout(r, ms));
          (async () => {
            const out = { widths: {}, failures: [] };
            const browser = await puppeteer.launch({ headless:'new', args:['--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage'] });
            for (const w of WIDTHS) {
              const mobile = w < 1024;
              const page = await browser.newPage();
              const errs = [];
              page.on('pageerror', e => errs.push((e.message||'').slice(0,200)));
              await page.setViewport({ width:w, height:880, isMobile:mobile, hasTouch:mobile, deviceScaleFactor: mobile?2:1 });
              await page.goto(SITE, { waitUntil:'load', timeout:60000 });
              await sleep(3500);
              const probe = await page.evaluate(() => {
                const de = document.documentElement;
                const sw = Math.max(de.scrollWidth, document.body.scrollWidth);
                return { overflowPx: Math.max(0, sw - window.innerWidth), cards: document.querySelectorAll('.product-card').length };
              });
              const realErrs = [...new Set(errs)].filter(e => !/Cross-Origin-Opener-Policy|X-Frame-Options.*meta|ResizeObserver loop/.test(e));
              out.widths[w] = { ...probe, pageErrors: realErrs };
              if (probe.overflowPx > 4) out.failures.push(`${w}px horizontal overflow ${probe.overflowPx}px`);
              if (realErrs.length) out.failures.push(`${w}px pageError: ${realErrs[0]}`);
              await page.screenshot({ path: `ci-audit/sweep-${w}.png` });
              await page.close();
            }
            // Banner-overlap regression at 320px (force install prompt + cookie banner together)
            const m = await browser.newPage();
            await m.setViewport({ width:320, height:880, isMobile:true, hasTouch:true, deviceScaleFactor:2 });
            await m.evaluateOnNewDocument(() => { try { localStorage.setItem('dm_visit_count','5'); localStorage.removeItem('dm_cookie_consent'); } catch(e){} });
            await m.goto(SITE, { waitUntil:'load', timeout:60000 }); await sleep(2000);
            await m.evaluate(() => { const e = new Event('beforeinstallprompt'); e.prompt = ()=>{}; e.userChoice = Promise.resolve({outcome:'dismissed'}); window.dispatchEvent(e); });
            await sleep(9000);
            out.bannerOverlap = await m.evaluate(() => {
              const r = el => el ? el.getBoundingClientRect() : null;
              const ri = r(document.getElementById('dm-pwa-install')), rc = r(document.getElementById('cookie-banner'));
              if (!ri || !rc) return { tested:false };
              const ox = Math.max(0, Math.min(ri.right,rc.right)-Math.max(ri.left,rc.left));
              const oy = Math.max(0, Math.min(ri.bottom,rc.bottom)-Math.max(ri.top,rc.top));
              return { tested:true, overlapArea: Math.round(ox*oy) };
            });
            if (out.bannerOverlap.tested && out.bannerOverlap.overlapArea > 0)
              out.failures.push(`install/cookie banner overlap ${out.bannerOverlap.overlapArea}px2`);
            await m.screenshot({ path:'ci-audit/sweep-banners.png' });
            await browser.close();
            fs.writeFileSync('ci-audit/sweep.json', JSON.stringify(out, null, 2));
            console.log(JSON.stringify(out, null, 2));
            if (out.failures.length) { console.error('SWEEP FAILED: ' + out.failures.join('; ')); process.exit(1); }
            console.log('SWEEP PASSED');
          })().catch(e => { console.error(e); process.exit(2); });
          SWEEP_EOF
          node ci-audit/sweep.js
          CODE=$?
          kill $SRV 2>/dev/null || true
          exit $CODE

      - name: Performance budget (FCP/DCL on pushed code)
        id: perfbudget
        continue-on-error: true
        run: |
          python3 -m http.server 8081 --directory "$GITHUB_WORKSPACE" >/dev/null 2>&1 &
          SRV=$!
          sleep 2
          cat > ci-audit/perf.js << 'PERF_EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          // Budgets are deliberately loose (CI runners are slow + shared):
          // they exist to catch CATASTROPHIC regressions — e.g. a new
          // synchronous blocking script — not to chase milliseconds.
          const BUDGET = { fcp: 3000, dcl: 3500, mobileLongTaskSum: 5000 };
          (async () => {
            const browser = await puppeteer.launch({ headless:'new', args:['--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage'] });
            const fails = [];
            // desktop cold
            const d = await browser.newPage();
            await d.setViewport({ width:1440, height:900 });
            await d.goto('http://localhost:8081/', { waitUntil:'load', timeout:90000 });
            await new Promise(r => setTimeout(r, 2000));
            const dm = await d.evaluate(() => {
              const nav = performance.getEntriesByType('navigation')[0];
              const p = {}; performance.getEntriesByType('paint').forEach(x => p[x.name] = Math.round(x.startTime));
              return { fcp: p['first-contentful-paint'] || 0, dcl: Math.round(nav.domContentLoadedEventEnd) };
            });
            if (dm.fcp > BUDGET.fcp) fails.push(`desktop FCP ${dm.fcp}ms > ${BUDGET.fcp}ms`);
            if (dm.dcl > BUDGET.dcl) fails.push(`desktop DCL ${dm.dcl}ms > ${BUDGET.dcl}ms`);
            await d.close();
            // mobile 4x throttle: long-task sum
            const m = await browser.newPage();
            await m.setViewport({ width:375, height:800, isMobile:true, hasTouch:true, deviceScaleFactor:2 });
            const cdp = await m.target().createCDPSession();
            await cdp.send('Emulation.setCPUThrottlingRate', { rate: 4 });
            await m.evaluateOnNewDocument(() => {
              window.__lt = 0;
              new PerformanceObserver(l => { for (const e of l.getEntries()) window.__lt += e.duration; })
                .observe({ entryTypes: ['longtask'] });
            });
            await m.goto('http://localhost:8081/', { waitUntil:'load', timeout:120000 });
            await new Promise(r => setTimeout(r, 4000));
            const lt = await m.evaluate(() => Math.round(window.__lt || 0));
            if (lt > BUDGET.mobileLongTaskSum) fails.push(`mobile(4x) long-task sum ${lt}ms > ${BUDGET.mobileLongTaskSum}ms`);
            await browser.close();
            const out = { desktop: dm, mobileLongTaskSum: lt, budget: BUDGET, fails };
            fs.writeFileSync('ci-audit/perf.json', JSON.stringify(out, null, 2));
            console.log(JSON.stringify(out));
            if (fails.length) { console.error('PERF BUDGET FAILED: ' + fails.join('; ')); process.exit(1); }
            console.log('PERF BUDGET PASSED');
          })().catch(e => { console.error(e); process.exit(2); });
          PERF_EOF
          node ci-audit/perf.js
          CODE=$?
          kill $SRV 2>/dev/null || true
          exit $CODE

      - name: Upload findings + screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-${{ github.run_number }}
          path: |
            ci-audit/findings.json
            ci-audit/home.png
            ci-audit/sweep.json
            ci-audit/perf.json
            ci-audit/sweep-*.png
          retention-days: 30

      - name: Open issue on failure
        if: steps.audit.outcome == 'failure' || steps.sweep.outcome == 'failure' || steps.perfbudget.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let findings = {};
            try { findings = JSON.parse(fs.readFileSync('ci-audit/findings.json','utf8')); } catch {}
            let sweep = {};
            try { sweep = JSON.parse(fs.readFileSync('ci-audit/sweep.json
            ci-audit/perf.json','utf8')); } catch {}
            const body = [
              '## Runtime audit failed',
              `**Site:** https://digitalmarketstore.shop/`,
              `**Run:** ${context.runNumber} (${context.runId})`,
              `**Triggered by:** ${context.eventName}`,
              '',
              '### Page errors',
              (findings.pageErrors || []).map(e => '- `' + e + '`').join('\n') || '_none_',
              '',
              '### Console errors',
              (findings.errors || []).slice(0,10).map(e => '- `' + e + '`').join('\n') || '_none_',
              '',
              '### Failed network requests',
              (findings.failedReqs || []).map(r => `- \`${r.url}\`: ${r.failure}`).join('\n') || '_none_',
              '',
              '### HTTP errors',
              (findings.httpErrors || []).map(r => `- ${r.status}: \`${r.url}\``).join('\n') || '_none_',
              '',
              '### Workflow checks',
              '```json',
              JSON.stringify(findings.workflows, null, 2),
              '```',
              '',
              '### Responsive + overlap sweep',
              (sweep.failures && sweep.failures.length) ? sweep.failures.map(f => '- ⚠️ `' + f + '`').join('\n') : '_no sweep failures (or sweep did not run)_',
              '```json',
              JSON.stringify({ widths: sweep.widths, bannerOverlap: sweep.bannerOverlap }, null, 2),
              '```',
              '',
              '_Audit artifacts (screenshots + findings.json + sweep.json) attached to this workflow run._'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[runtime-audit] Site issues detected (run ${context.runNumber})`,
              body,
              labels: ['bug', 'runtime-audit']
            });

      - name: Fail step if audit or sweep failed
        if: steps.audit.outcome == 'failure' || steps.sweep.outcome == 'failure' || steps.perfbudget.outcome == 'failure'
        run: exit 1
