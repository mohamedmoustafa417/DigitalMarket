    <text x="134" y="253" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="#000000" text-anchor="middle">↗ شاركها مع صديق  |  Tag a friend below 👇</text>
  </g>

  <!-- MOCKUP 2: Business Quote Post (dark blue) — back right, tilted -->
  <g transform="translate(848, 30) rotate(7)" filter="url(#shadow)">
    <rect width="268" height="268" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="0" y="0" width="10" height="268" rx="4" fill="url(#accentBlue)"/>
    <circle cx="238" cy="38" r="60" fill="#3b82f6" opacity="0.07"/>
    <circle cx="238" cy="38" r="42" fill="#3b82f6" opacity="0.06"/>
