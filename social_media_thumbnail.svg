<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="mainBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="limeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a3e635"/>
      <stop offset="100%" style="stop-color:#65a30d"/>
    </linearGradient>
    <linearGradient id="limeV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a3e635"/>
      <stop offset="100%" style="stop-color:#4d7c0f"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="630" fill="url(#mainBg)"/>

  <!-- Top lime accent stripe -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#limeGrad)"/>

  <!-- Subtle glow effects -->
  <circle cx="0" cy="315" r="400" fill="#a3e635" opacity="0.03"/>
  <circle cx="1200" cy="100" r="300" fill="#3b82f6" opacity="0.04"/>
  <circle cx="1100" cy="580" r="220" fill="#a3e635" opacity="0.03"/>

  <!-- ===================== LEFT CONTENT ===================== -->

  <!-- Category badge -->
  <rect x="60" y="58" width="152" height="30" rx="15" fill="#a3e635" opacity="0.15"/>
  <rect x="60" y="58" width="152" height="30" rx="15" fill="none" stroke="#a3e635" stroke-width="1.5" opacity="0.5"/>
  <text x="136" y="78" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a3e635" text-anchor="middle" letter-spacing="1.5">TEMPLATES</text>

  <!-- Main title -->
  <text x="60" y="148" font-family="Arial Black, Arial, sans-serif" font-size="46" font-weight="900" fill="#ffffff">Viral Social Media</text>
  <text x="60" y="200" font-family="Arial Black, Arial, sans-serif" font-size="46" font-weight="900" fill="#a3e635">Templates Pack</text>

  <!-- Arabic subtitle -->
  <text x="60" y="238" font-family="Arial, sans-serif" font-size="18" fill="#555555">باقة قوالب سوشيال ميديا جاهزة للنشر</text>

  <!-- Divider -->
  <rect x="60" y="260" width="400" height="2" rx="1" fill="url(#limeGrad)" opacity="0.5"/>

  <!-- Feature list -->
  <circle cx="76" cy="295" r="7" fill="#a3e635"/>
  <text x="96" y="301" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">9 Post Templates  (1:1 Square)</text>

  <circle cx="76" cy="328" r="7" fill="#a3e635"/>
  <text x="96" y="334" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">6 Story Templates  (9:16 Vertical)</text>

  <circle cx="76" cy="361" r="7" fill="#a3e635"/>
  <text x="96" y="367" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Arabic &amp; English Bilingual</text>

  <circle cx="76" cy="394" r="7" fill="#a3e635"/>
  <text x="96" y="400" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Fully Editable SVG Files</text>

  <circle cx="76" cy="427" r="7" fill="#a3e635"/>
  <text x="96" y="433" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Business, Tips, Quotes &amp; More</text>

  <!-- Stats badges row -->
  <rect x="60" y="468" width="118" height="48" rx="10" fill="#a3e635" opacity="0.1"/>
  <rect x="60" y="468" width="118" height="48" rx="10" fill="none" stroke="#a3e635" stroke-width="1.5" opacity="0.35"/>
  <text x="119" y="490" font-family="Arial Black, sans-serif" font-size="19" font-weight="900" fill="#a3e635" text-anchor="middle">15</text>
  <text x="119" y="507" font-family="Arial, sans-serif" font-size="11" fill="#777777" text-anchor="middle">Templates</text>

  <rect x="190" y="468" width="118" height="48" rx="10" fill="#a3e635" opacity="0.1"/>
  <rect x="190" y="468" width="118" height="48" rx="10" fill="none" stroke="#a3e635" stroke-width="1.5" opacity="0.35"/>
  <text x="249" y="490" font-family="Arial Black, sans-serif" font-size="19" font-weight="900" fill="#a3e635" text-anchor="middle">SVG</text>
  <text x="249" y="507" font-family="Arial, sans-serif" font-size="11" fill="#777777" text-anchor="middle">Format</text>

  <rect x="320" y="468" width="138" height="48" rx="10" fill="#a3e635" opacity="0.1"/>
  <rect x="320" y="468" width="138" height="48" rx="10" fill="none" stroke="#a3e635" stroke-width="1.5" opacity="0.35"/>
  <text x="389" y="490" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#a3e635" text-anchor="middle">Ready to Post</text>
  <text x="389" y="507" font-family="Arial, sans-serif" font-size="11" fill="#777777" text-anchor="middle">No design skills needed</text>

