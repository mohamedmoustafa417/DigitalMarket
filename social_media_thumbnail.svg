  <!-- MOCKUP 1: Viral Tips Post (lime/dark) — back left, tilted -->
  <g transform="translate(530, 40) rotate(-7)" filter="url(#shadow)">
    <rect width="268" height="268" rx="12" fill="#0a0a0a" stroke="#333333" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="268" rx="3" fill="url(#limeV)"/>
    <rect x="0" y="0" width="268" height="58" fill="#a3e635" opacity="0.06"/>
    <!-- Save badge -->
