    <text x="134" y="115" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#ffffff" text-anchor="middle">Your Motivational</text>
    <text x="134" y="138" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#ffffff" text-anchor="middle">Quote Goes Here</text>
    <rect x="84" y="152" width="100" height="3" rx="1" fill="url(#accentBlue)"/>
    <text x="134" y="180" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#94a3b8" text-anchor="middle">اكتب اقتباسك هنا</text>
