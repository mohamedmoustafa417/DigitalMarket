    <text x="134" y="222" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">— Author Name / المصدر</text>
    <rect x="0" y="236" width="268" height="32" fill="#ffffff" opacity="0.03"/>
    <circle cx="38" cy="252" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="38" y="256" font-family="Arial, sans-serif" font-size="7" fill="#3b82f6" text-anchor="middle">LOGO</text>
    <text x="56" y="248" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Brand Name</text>
    <text x="56" y="262" font-family="Arial, sans-serif" font-size="9" fill="#64748b">@username  |  www.yourwebsite.com</text>
  </g>

  <!-- MOCKUP 3: Story (lime/dark) — center front, tall -->
  <g transform="translate(700, 26) rotate(-2)" filter="url(#shadow)">
    <rect width="152" height="272" rx="12" fill="#09090b" stroke="#a3e635" stroke-width="2" opacity="0.65"/>
    <rect x="0" y="0" width="5" height="272" rx="2" fill="url(#limeV)"/>
    <rect x="0" y="0" width="152" height="70" fill="#a3e635" opacity="0.05"/>
    <!-- Save stamp -->
    <rect x="8" y="10" width="136" height="34" rx="8" fill="#a3e635" opacity="0.92"/>
    <text x="76" y="23" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="#000000" text-anchor="middle">💾 احفظ هذا البوست</text>
    <text x="76" y="37" font-family="Arial Black, sans-serif" font-size="7.5" font-weight="900" fill="#1a2e00" text-anchor="middle">SAVE THIS — You'll need it later</text>
    <!-- Headline -->
    <text x="14" y="76" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#ffffff">7 حاجات</text>
    <text x="14" y="98" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#a3e635">تخلي صفحتك</text>
    <text x="14" y="120" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#ffffff">تطلع فيها</text>
    <text x="14" y="135" font-family="Arial, sans-serif" font-size="8" fill="#444444">7 things that make your page blow up</text>
    <rect x="14" y="142" width="124" height="1" fill="#a3e635" opacity="0.25"/>
    <!-- Tips -->
    <rect x="14" y="146" width="124" height="22" rx="3" fill="#ffffff" opacity="0.025"/>
    <rect x="14" y="146" width="3" height="22" fill="#a3e635"/>
    <text x="22" y="161" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#a3e635">1.</text>
    <text x="36" y="161" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">هوك قوي في أول جملة</text>
    <rect x="14" y="172" width="124" height="22" rx="3" fill="#ffffff" opacity="0.025"/>
    <rect x="14" y="172" width="3" height="22" fill="#a3e635"/>
    <text x="22" y="187" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#a3e635">2.</text>
    <text x="36" y="187" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">بوست كل يوم</text>
    <rect x="14" y="198" width="124" height="22" rx="3" fill="#a3e635" opacity="0.04"/>
    <rect x="14" y="198" width="3" height="22" fill="#a3e635"/>
    <text x="22" y="213" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#a3e635">3.</text>
    <text x="36" y="213" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">استخدم الريلز يومياً</text>
    <rect x="14" y="224" width="124" height="22" rx="3" fill="#ffffff" opacity="0.025"/>
    <rect x="14" y="224" width="3" height="22" fill="#a3e635"/>
    <text x="22" y="239" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#a3e635">4.</text>
    <text x="36" y="239" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">رد على كل كومنت</text>
    <!-- CTA -->
    <rect x="14" y="252" width="124" height="14" rx="4" fill="#a3e635" opacity="0.1"/>
    <text x="76" y="262" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#a3e635" text-anchor="middle">💾 احفظ وشارك مع صاحبك 👇</text>
  </g>

  <!-- "15 Templates" floating pill -->
  <g transform="translate(858, 326)">
    <rect x="0" y="0" width="138" height="36" rx="18" fill="#a3e635"/>
    <text x="69" y="23" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="#000000" text-anchor="middle">15 Templates</text>
  </g>

</svg>
