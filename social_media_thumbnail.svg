    <text x="213" y="23" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" fill="#000000" text-anchor="middle">💾 SAVE THIS</text>
    <!-- Title -->
    <text x="16" y="82" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#ffffff">5 أسرار</text>
    <text x="16" y="107" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#a3e635">لنجاح البيزنس</text>
    <text x="16" y="124" font-family="Arial, sans-serif" font-size="9" fill="#555555">5 Business Secrets Nobody Tells You</text>
