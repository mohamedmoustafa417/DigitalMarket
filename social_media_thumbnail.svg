    <text x="26" y="156" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#a3e635">01</text>
    <text x="54" y="156" font-family="Arial, sans-serif" font-size="10.5" fill="#ffffff">ابدأ قبل ما تكون جاهز</text>
    <rect x="16" y="169" width="236" height="27" rx="4" fill="#ffffff" opacity="0.03"/>
    <rect x="16" y="169" width="3" height="27" fill="#a3e635"/>
    <text x="26" y="187" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#a3e635">02</text>
    <text x="54" y="187" font-family="Arial, sans-serif" font-size="10.5" fill="#ffffff">المحتوى هو أقوى إعلان</text>
    <rect x="16" y="200" width="236" height="27" rx="4" fill="#a3e635" opacity="0.04"/>
    <rect x="16" y="200" width="3" height="27" fill="#a3e635"/>
    <text x="26" y="218" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#a3e635">03</text>
    <text x="54" y="218" font-family="Arial, sans-serif" font-size="10.5" fill="#ffffff">بع الحل مش المنتج</text>
    <!-- Bottom CTA -->
